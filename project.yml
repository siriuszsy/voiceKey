name: voiceKey

options:
  createIntermediateGroups: true
  minimumXcodeGenVersion: 2.38.0

configs:
  Debug: debug
  Release: release
  GitHubRelease: release

configFiles:
  Debug: voiceKey/Support/Signing.xcconfig
  Release: voiceKey/Support/Signing.xcconfig
  GitHubRelease: voiceKey/Support/Signing.github-release.xcconfig

settings:
  base:
    PRODUCT_NAME: voiceKey
    PRODUCT_BUNDLE_IDENTIFIER: com.littlerobot.voicekey
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: 14.0
    CURRENT_PROJECT_VERSION: 7
    MARKETING_VERSION: 1.0.6

targets:
  voiceKey:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: voiceKey
        excludes:
          - Resources
          - voiceKeyTests
      - path: voiceKey/Resources
        buildPhase: resources
        excludes:
          - AppIconSource.svg
    info:
      path: voiceKey/Support/Info.plist
      properties:
        CFBundleName: 音键
        CFBundleDisplayName: 音键
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSUIElement: true
        NSMicrophoneUsageDescription: 音键需要麦克风权限来采集语音输入。
    settings:
      base:
        INFOPLIST_FILE: voiceKey/Support/Info.plist
        PRODUCT_MODULE_NAME: voiceKey
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: ""
        Release:
          CODE_SIGN_ENTITLEMENTS: voiceKey/Support/voiceKey.entitlements
        GitHubRelease:
          CODE_SIGN_ENTITLEMENTS: voiceKey/Support/voiceKey.github-release.entitlements
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: $(inherited) GITHUB_DIRECT_RELEASE

  voiceKeyTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: voiceKeyTests
    dependencies:
      - target: voiceKey
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_NAME: voiceKeyTests
        PRODUCT_MODULE_NAME: voiceKeyTests
        PRODUCT_BUNDLE_IDENTIFIER: com.littlerobot.voicekeyTests
